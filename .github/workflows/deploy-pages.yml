name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装下载工具 & 下载导出模板
        run: |
          echo "=== 安装 wget ==="
          apt-get update -qq && apt-get install -y -qq wget
          echo "=== 创建导出模板目录 ==="
          mkdir -p /root/.local/share/godot/export_templates/4.3.stable
          mkdir -p /home/runner/.local/share/godot/export_templates/4.3.stable
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          echo "=== 下载模板 ==="
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/export_templates.tpz
          echo "=== 解压 ==="
          unzip -q /tmp/export_templates.tpz -d /tmp/export_templates
          echo "=== 复制到所有可能的路径 ==="
          cp -r /tmp/export_templates/templates/4.3.stable/* /root/.local/share/godot/export_templates/4.3.stable/
          cp -r /tmp/export_templates/templates/4.3.stable/* ~/.local/share/godot/export_templates/4.3.stable/
          echo "=== 验证模板文件 ==="
          ls -la /root/.local/share/godot/export_templates/4.3.stable/
          echo "=== 检查 web 模板 ==="
          ls /root/.local/share/godot/export_templates/4.3.stable/web* 2>/dev/null || echo "没有 web 前缀的模板"
          ls /root/.local/share/godot/export_templates/4.3.stable/ | grep -i web
          echo "=== HOME 路径 ==="
          echo $HOME
          echo "=== 清理临时文件 ==="
          rm -rf /tmp/export_templates /tmp/export_templates.tpz

      - name: Build HTML5
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web