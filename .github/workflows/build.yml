name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装下载工具 & 下载导出模板
        run: |
          echo "=== 安装 wget ==="
          apt-get update -qq && apt-get install -y -qq wget
          echo "=== 创建导出模板目录 ==="
          mkdir -p /root/.local/share/godot/export_templates/4.3.stable
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          echo "=== 下载模板 ==="
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/export_templates.tpz
          echo "=== 解压 ==="
          unzip -q /tmp/export_templates.tpz -d /tmp/export_templates
          echo "=== 复制到所有可能的路径 ==="
          cp -r /tmp/export_templates/templates/4.3.stable/* /root/.local/share/godot/export_templates/4.3.stable/
          cp -r /tmp/export_templates/templates/4.3.stable/* ~/.local/share/godot/export_templates/4.3.stable/
          echo "=== 验证模板文件 ==="
          ls -la /root/.local/share/godot/export_templates/4.3.stable/
          echo "=== 清理临时文件 ==="
          rm -rf /tmp/export_templates /tmp/export_templates.tpz

      - name: Build Windows
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/RPG-Game.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装下载工具 & 下载导出模板
        run: |
          echo "=== 安装 wget ==="
          apt-get update -qq && apt-get install -y -qq wget
          echo "=== 创建导出模板目录 ==="
          mkdir -p /root/.local/share/godot/export_templates/4.3.stable
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          echo "=== 下载模板 ==="
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/export_templates.tpz
          echo "=== 解压 ==="
          unzip -q /tmp/export_templates.tpz -d /tmp/export_templates
          echo "=== 复制到所有可能的路径 ==="
          cp -r /tmp/export_templates/templates/4.3.stable/* /root/.local/share/godot/export_templates/4.3.stable/
          cp -r /tmp/export_templates/templates/4.3.stable/* ~/.local/share/godot/export_templates/4.3.stable/
          echo "=== 验证模板文件 ==="
          ls -la /root/.local/share/godot/export_templates/4.3.stable/
          echo "=== 清理临时文件 ==="
          rm -rf /tmp/export_templates /tmp/export_templates.tpz

      - name: Build Linux
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux" build/linux/RPG-Game.x86_64

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/

  build-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装下载工具 & 下载导出模板
        run: |
          echo "=== 安装 wget ==="
          apt-get update -qq && apt-get install -y -qq wget
          echo "=== 创建导出模板目录 ==="
          mkdir -p /root/.local/share/godot/export_templates/4.3.stable
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          echo "=== 下载模板 ==="
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/export_templates.tpz
          echo "=== 解压 ==="
          unzip -q /tmp/export_templates.tpz -d /tmp/export_templates
          echo "=== 复制到所有可能的路径 ==="
          cp -r /tmp/export_templates/templates/4.3.stable/* /root/.local/share/godot/export_templates/4.3.stable/
          cp -r /tmp/export_templates/templates/4.3.stable/* ~/.local/share/godot/export_templates/4.3.stable/
          echo "=== 验证模板文件 ==="
          ls -la /root/.local/share/godot/export_templates/4.3.stable/
          echo "=== 检查 web 模板 ==="
          ls /root/.local/share/godot/export_templates/4.3.stable/web* 2>/dev/null || echo "没有 web 前缀的模板"
          ls /root/.local/share/godot/export_templates/4.3.stable/ | grep -i web
          echo "=== HOME 路径 ==="
          echo $HOME
          echo "=== 清理临时文件 ==="
          rm -rf /tmp/export_templates /tmp/export_templates.tpz

      - name: Build HTML5
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  release:
    needs: [build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package Windows
        run: zip -r RPG-Game-Windows.zip windows-build/

      - name: Package Linux
        run: zip -r RPG-Game-Linux.zip linux-build/

      - name: Package Web
        run: zip -r RPG-Game-Web.zip web-build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            RPG-Game-Windows.zip
            RPG-Game-Linux.zip
            RPG-Game-Web.zip
          generate_release_notes: true