<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
    <radialGradient id="pupil_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Sfondo -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Circuiti decorativi -->
  <line x1="8" y1="47" x2="30" y2="47" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="47" x2="35" y2="52" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="81" x2="30" y2="81" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="81" x2="35" y2="76" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="8" cy="47" r="2" fill="#00c6ff" opacity="0.4"/>
  <circle cx="8" cy="81" r="2" fill="#00c6ff" opacity="0.4"/>
  <line x1="120" y1="47" x2="98" y2="47" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <line x1="98" y1="47" x2="93" y2="52" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="81" x2="98" y2="81" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <line x1="98" y1="81" x2="93" y2="76" stroke="#00c6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="120" cy="47" r="2" fill="#00c6ff" opacity="0.4"/>
  <circle cx="120" cy="81" r="2" fill="#00c6ff" opacity="0.4"/>

  <!-- Forma occhio -->
  <path d="M 18 64 Q 64 22 110 64 Q 64 106 18 64 Z" fill="#0a1628" stroke="#00c6ff" stroke-width="2"/>

  <!-- Iride -->
  <circle cx="64" cy="64" r="22" fill="url(#iris)" opacity="0.95"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="#00eaff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="64" cy="64" r="17" fill="none" stroke="#0072ff" stroke-width="1" opacity="0.5"/>

  <!-- Segmenti digitali iride -->
  <g stroke="#ffffff" stroke-width="0.8" opacity="0.3" fill="none">
    <line x1="64" y1="42" x2="64" y2="46"/>
    <line x1="64" y1="82" x2="64" y2="86"/>
    <line x1="42" y1="64" x2="46" y2="64"/>
    <line x1="82" y1="64" x2="86" y2="64"/>
    <line x1="48" y1="48" x2="51" y2="51"/>
    <line x1="80" y1="48" x2="77" y2="51"/>
    <line x1="48" y1="80" x2="51" y2="77"/>
    <line x1="80" y1="80" x2="77" y2="77"/>
  </g>

  <!-- Pupilla -->
  <circle cx="64" cy="64" r="11" fill="#050510"/>
  <circle cx="64" cy="64" r="10" fill="url(#pupil_glow)" opacity="0.85"/>
  <circle cx="64" cy="64" r="7" fill="#050510"/>

  <!-- Riflesso -->
  <ellipse cx="59" cy="59" rx="3" ry="2" fill="white" opacity="0.2" transform="rotate(-25 59 59)"/>

  <!-- AI nella pupilla -->
  <text x="64" y="68" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="7" fill="#00ffcc" opacity="0.95">AI</text>

  <!-- Nome in basso -->
  <text x="64" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#ffffff" letter-spacing="0.5">Godo4</text>
  <text x="64" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="7" fill="#00c6ff" letter-spacing="1">NewbiAI</text>
</svg>
